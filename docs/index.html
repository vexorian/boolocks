 to do With:color = ...:color , but this is\nnot an ideal world)\n(With:color = (Block:red or AntiBlock:red or WildCard or AntiWildCard) Wall)\nWith:red    = Block:red:lock    or AntiBlock:red:color    or WildCard or AntiWildCard \nWith:blue   = Block:blue:lock   or AntiBlock:blue:color   or WildCard or AntiWildCard \nWith:yellow = Block:yellow:lock or AntiBlock:yellow:color or WildCard or AntiWildCard \n\n\n\n\n(I hate this so much, I had a better set of rules at one point, but I wanted to clean them up, it led to PS:next\nbasically dying on me and getting all bugged and I was forced to type these things to 'fix' the problem)\n\nClosedB:no_lock =      Block:no_lock or     Player:direction:no_lock  or     Glue:no_lock  or     WildCard:no_lock  or     Wall:no_lock\nClosed:red   =      Block:red  or     Player:direction:red or     Glue:red or     WildCard:red or     Wall:red\nClosed:yellow   =      Block:yellow  or     Player:direction:yellow or     Glue:yellow or     WildCard:yellow or     Wall:yellow\nClosed:blue   =      Block:blue  or     Player:direction:blue or     Glue:blue or     WildCard:blue or     Wall:blue\n\nAntiClosed:red   =      AntiBlock:red  or     AntiPlayer:direction:red or     AntiGlue:red or     AntiWildCard:red or     AntiWall:red\nAntiClosed:yellow   =      AntiBlock:yellow  or     AntiPlayer:direction:yellow or     AntiGlue:yellow or     AntiWildCard:yellow or     AntiWall:yellow\nAntiClosed:blue   =      AntiBlock:blue  or     AntiPlayer:direction:blue or     AntiGlue:blue or     AntiWildCard:blue or     AntiWall:blue\n\n\n(BUG HERE, comment next line and comment ount the following 3 lines to fix it)\n(Open:color       = OpenBlock:color or OpenPlayer:color or OpenGlue:color or  OpenWildCard:color or OpenWall:color)\n\n\nOpen:red       = OpenBlock:red or OpenPlayer:red or OpenGlue:red or OpenWildCard:red or OpenWall:red\nOpen:yellow    = OpenBlock:yellow or OpenPlayer:yellow or OpenGlue:yellow or OpenWildCard:yellow or OpenWall:yellow\nOpen:bl d many ways to tackle this problem. I am very happy with\nthe current version)\n\n( The first time the state of a color changes, the next open/close triggers inmediately.\nBut the consecutive triggers are delayed.\nThere is a 'cooldown' effect after forcing the first effect trigger, so that if triggers are happening\nconstantly, this effect will not happen again until things slow down for a while)\n\n(Additionally, I made the distance between triggers not constant, that makes it sound like it is\ndoing music instead of just looping infinitely)\n\n\n(Before maybe  running the locks logic, check if the state of goal cells has changed)\n[ HeroCell ] -> gosub Goals \n\n(Run the Lock logic but only on certain occasions)\n\ns20 [ HeroCell Tick:odd stationary LockTick:s20 ] -> [ HeroCell Tick:odd action LockTick:next20 ]\n[ HeroCell Tick:odd no LockTick:s20 ] -> [ HeroCell Tick:odd LockTick:m0 ]\n\n[ HeroCell Tick:odd GoalStateChanged no LockCooldown ] -> [ HeroCell Tick:odd GoalStateChanged LockCooldown ExecuteLockLogic LockTick:m0 ]\n\n[ HeroCell Tick:odd LockCooldown LockTick:m19 ] -> [ HeroCell Tick:odd LockTick:m19 ]\n\n\n[ HeroCell LockRate ] -> [ HeroCell LockRate ExecuteLockLogic ]\n\n\n[ ExecuteLockLogic no LockRate  ] -> []\n\n[ HeroCell Tick:odd ExecuteLockLogic ] -> [HeroCell Tick:odd] gosub Locks \n\n\n\n(Now the movement)\n[ Moving:direction ] -> []\n[ > player ] -> [ > player Moving:> ]\n[ Error ] -> []\n[ HeroCell ] -> gosub SpreadMovement\n\n[ Moving:> Solid | Wall ] -> [ Error Solid | Wall ]\n\n[ HeroCell ] -> gosub SpreadErrors\n\n\n[ Moving:direction ] -> []\n[ > player no Error ] -> [ stationary player Moving:> ]\n[ HeroCell ] -> gosub SpreadMovement\n[ Moving:> Solid ] -> [ > Solid ]\n\n\n[ HeroCell ] ->  gosub Animations\n\n\n\n(================================================================================)\nsubroutine ActivatePlayerMovement\n\n[ no KeyPress:> ActiveMoving:> ] -> []\n[ no KeyPress:> ReallyMoving:> ] -> []\n\n\n[ HeroCell ReallyMovi
